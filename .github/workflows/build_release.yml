name: Build_Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libcurl4-openssl-dev
            gcc-multilib \
            g++-multilib \
            libcurl4-openssl-dev:i386
        
      - name: Build 64-bit extension
        run: |
          mkdir -p build64
          cd build64
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release
          cd ..
          if [ -f "build64/attendance_bot.so" ]; then
            cp build64/attendance_bot.so @attendance_bot/attendance_bot_64.so
          elif [ -f "build64/libattendance_bot.so" ]; then
            cp build64/libattendance_bot.so @attendance_bot/attendance_bot_64.so
          else
            echo "ERROR: 64-bit .so not found"
            ls -la build64/
            exit 1
          fi
          
      - name: Build 32-bit extension
        run: |
          mkdir -p build32
          cd build32
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32" ..
          cmake --build . --config Release
          cd ..
          if [ -f "build32/attendance_bot.so" ]; then
            cp build32/attendance_bot.so @attendance_bot/attendance_bot_32.so
          elif [ -f "build32/libattendance_bot.so" ]; then
            cp build32/libattendance_bot.so @attendance_bot/attendance_bot_32.so
          else
            echo "ERROR: 32-bit .so not found"
            ls -la build32/
            exit 1
          fi
          
      - name: Create symlink
        run: ln -sf attendance_bot_64.so @attendance_bot/attendance_bot.so
        
      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1
        
      - name: Run HEMTT build
        run: hemtt release
        
      - name: Rename output to match expected folder
        run: |
          mkdir -p .hemttout
          if [ -d "release/@attendance_bot" ]; then
            mv release/@attendance_bot .hemttout/@attendance_bot
          elif [ -d "release" ]; then
            mv release .hemttout/@attendance_bot
          fi
        
      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: attendance_bot
          path: .hemttout/@attendance_bot
          include-hidden-files: true
          if-no-files-found: error
