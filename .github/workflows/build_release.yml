name: Build_Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOD_NAME: attendance_bot

jobs:
  # ============================================================================
  # Build 64-bit extension
  # ============================================================================
  build-64:
    name: Build 64-bit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev
          
      - name: Build extension
        run: |
          mkdir -p build64
          cd build64
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release
          cd ..
          
          # Copy to artifact location with correct name
          if [ -f "build64/attendance_bot.so" ]; then
            cp build64/attendance_bot.so ${{ env.MOD_NAME }}_x64.so
          elif [ -f "build64/libattendance_bot.so" ]; then
            cp build64/libattendance_bot.so ${{ env.MOD_NAME }}_x64.so
          else
            echo "ERROR: 64-bit .so not found"
            ls -la build64/
            exit 1
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-64
          path: ${{ env.MOD_NAME }}_x64.so
          retention-days: 1

  # ============================================================================
  # Build 32-bit extension
  # ============================================================================
  build-32:
    name: Build 32-bit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
        
      - name: Install 32-bit dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            gcc-multilib g++-multilib \
            libcurl4-openssl-dev:i386
          
      - name: Build extension
        run: |
          mkdir -p build32
          cd build32
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_CXX_FLAGS="-m32" \
            ..
          cmake --build . --config Release
          cd ..
          
          # Copy to artifact location with correct name
          if [ -f "build32/attendance_bot.so" ]; then
            cp build32/attendance_bot.so ${{ env.MOD_NAME }}.so
          elif [ -f "build32/libattendance_bot.so" ]; then
            cp build32/libattendance_bot.so ${{ env.MOD_NAME }}.so
          else
            echo "ERROR: 32-bit .so not found"
            ls -la build32/
            exit 1
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-32
          path: ${{ env.MOD_NAME }}.so
          retention-days: 1

  # ============================================================================
  # Build PBO with HEMTT (parallel with extension builds)
  # ============================================================================
  build-pbo:
    name: Build PBO
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
        
      - name: Prepare PBO source files
        run: |
          # Copy PBO source to output directory
          mkdir -p pbo-output/@attendance_bot/addons/attendance_bot/scripts
          cp -r @attendance_bot/mod.cpp pbo-output/@attendance_bot/
          cp -r @attendance_bot/logo.paa pbo-output/@attendance_bot/
          cp -r @attendance_bot/addons/attendance_bot/* pbo-output/@attendance_bot/addons/attendance_bot/
          cp -r @attendance_bot/keys pbo-output/@attendance_bot/
          
      - name: Upload PBO artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbo
          path: pbo-output/
          retention-days: 1

  # ============================================================================
  # Package everything into final ZIP
  # ============================================================================
  package:
    name: Package Release
    needs: [build-64, build-32, build-pbo]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Create mod structure
        run: |
          mkdir -p ${{ env.MOD_NAME }}
          
          # Copy extensions
          cp artifacts/extension-64/${{ env.MOD_NAME }}_x64.so ${{ env.MOD_NAME }}/
          cp artifacts/extension-32/${{ env.MOD_NAME }}.so ${{ env.MOD_NAME }}/
          
          # Copy PBO source files (will be packed manually)
          if [ -d "artifacts/pbo" ]; then
            cp -r artifacts/pbo/* ${{ env.MOD_NAME }}/
          fi
          
          # Copy config examples
          cp tools/config.hpp.example ${{ env.MOD_NAME }}/
          cp tools/config.json.example ${{ env.MOD_NAME }}/
          
      - name: Create ZIP
        run: |
          mkdir -p .hemttout
          cd ${{ env.MOD_NAME }}
          zip -r9 ../.hemttout/${{ env.MOD_NAME }}-v${{ steps.version.outputs.VERSION }}.zip .
          cd ..
          
      - name: Upload final release
        uses: actions/upload-artifact@v4
        with:
          name: attendance_bot
          path: .hemttout/${{ env.MOD_NAME }}-v${{ steps.version.outputs.VERSION }}.zip
          if-no-files-found: error
