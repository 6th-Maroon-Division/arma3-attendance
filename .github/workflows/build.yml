name: Build Attendance Bot Extension

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    name: Build Linux Extension
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libcurl4-openssl-dev \
          gcc-multilib \
          g++-multilib \
          libcurl4-openssl-dev:i386
          
    - name: Build 64-bit extension
      run: |
        mkdir -p build64
        cd build64
        cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ..
        cmake --build . --config ${{ env.BUILD_TYPE }} --target attendance_bot
        cd ..
        
    - name: Build 32-bit extension
      run: |
        mkdir -p build32
        cd build32
        cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 ..
        cmake --build . --config ${{ env.BUILD_TYPE }} --target attendance_bot
        cd ..
        
    - name: Prepare mod directory
      run: |
        mkdir -p @attendance_bot/addons/attendance_bot
        cp build64/attendance_bot.so @attendance_bot/addons/attendance_bot/attendance_bot_64.so
        cp build32/attendance_bot.so @attendance_bot/addons/attendance_bot/attendance_bot_32.so
        cp -r scripts/* @attendance_bot/ || true
        
    - name: Create mod package
      run: |
        cd @attendance_bot
        tar -czf ../attendance_bot_linux.tar.gz .
        cd ..
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: attendance-bot-mod
        path: |
          @attendance_bot/
          build64/attendance_bot.so
          build32/attendance_bot.so
          attendance_bot_linux.tar.gz
        retention-days: 30
        
    - name: Show deployment info
      run: |
        echo "=========================================="
        echo "Build Complete!"
        echo "=========================================="
        echo ""
        echo "Artifacts uploaded:"
        echo "  - @attendance_bot/ (mod folder structure)"
        echo "  - build64/attendance_bot.so (64-bit Linux)"
        echo "  - build32/attendance_bot.so (32-bit Linux)"
        echo "  - attendance_bot_linux.tar.gz (complete package)"
        echo ""
        echo "To deploy on your Arma 3 Linux server:"
        echo ""
        echo "1. Set these GitHub secrets on your repository:"
        echo "   - BOT_API_TOKEN = your_bot_api_bearer_token"
        echo "   - BOT_API_ENDPOINT = https://your-api.com/api/bot/events"
        echo ""
        echo "2. Download the mod package from GitHub Actions artifacts"
        echo ""
        echo "3. On your server, extract the package:"
        echo "   tar -xzf attendance_bot_linux.tar.gz"
        echo ""
        echo "4. Set environment variables in your server startup:"
        echo "   export BOT_API_TOKEN='your_token_from_secrets'"
        echo "   export BOT_API_ENDPOINT='your_endpoint_from_secrets'"
        echo ""
        echo "5. Select the correct architecture:"
        echo "   For 64-bit Arma 3: cp attendance_bot_64.so attendance_bot.so"
        echo "   For 32-bit Arma 3: cp attendance_bot_32.so attendance_bot.so"
        echo ""
        echo "6. Launch Arma 3 server with: -mod=@attendance_bot"
        echo ""
        echo "The extension will automatically load the token from"
        echo "the BOT_API_TOKEN environment variable."
        echo "=========================================="
