name: Build

on: [push]

jobs:
  build-64:
    name: Build 64-bit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libcurl4-openssl-dev
      - name: Build extension
        run: |
          mkdir -p build64
          cd build64
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release
          cd ..
          mkdir -p release/@attendance_bot
          cp build64/attendance_bot* release/@attendance_bot/attendance_bot_x64.so
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ext-64
          path: release/@attendance_bot/attendance_bot_x64.so
          retention-days: 1

  build-32:
    name: Build 32-bit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            gcc-multilib g++-multilib \
            libcurl4-openssl-dev:i386
      - name: Build extension
        run: |
          mkdir -p build32
          cd build32
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32" ..
          cmake --build . --config Release
          cd ..
          mkdir -p release/@attendance_bot
          cp build32/attendance_bot* release/@attendance_bot/attendance_bot.so
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ext-32
          path: release/@attendance_bot/attendance_bot.so
          retention-days: 1

  build-pbo:
    name: Pack PBO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Mikero dependencies
        run: sudo apt-get update && sudo apt-get install -y liblzo2-2 libvorbis0a libvorbisfile3 libvorbisenc2 libogg0 libuchardet0
      - name: Download and setup Mikero tools
        run: |
          wget -q -O /tmp/depbo.tgz https://mikero.bytex.digital/api/download?filename=depbo-tools-0.10.18-linux-amd64.tgz
          mkdir -p /tmp/mikero
          tar -xzf /tmp/depbo.tgz -C /tmp/mikero --strip-components=1
      - name: Pack PBO
        run: |
          cd /tmp/mikero
          LD_LIBRARY_PATH=./lib ./bin/makepbo '${{ github.workspace }}/@attendance_bot/addons/attendance_bot'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbo
          path: '@attendance_bot/addons/attendance_bot.pbo'
          retention-days: 1

  package:
    name: Package Release
    needs: [build-64, build-32, build-pbo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release structure
        run: |
          mkdir -p release/@attendance_bot
          cp -r @attendance_bot/* release/@attendance_bot/
          rm -rf release/@attendance_bot/addons
          mkdir -p release/@attendance_bot/addons
          cp @attendance_bot/addons/attendance_bot/* release/@attendance_bot/addons/attendance_bot/
          cp artifacts/ext-64/attendance_bot_x64.so release/@attendance_bot/
          cp artifacts/ext-32/attendance_bot.so release/@attendance_bot/
          cp artifacts/pbo/attendance_bot.pbo release/@attendance_bot/addons/
          cp tools/config.hpp.example release/@attendance_bot/
          cp tools/config.json.example release/@attendance_bot/
      - name: Create ZIP
        run: |
          cd release
          zip -r ../attendance_bot.zip @attendance_bot
          cd ..
      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: attendance_bot
          path: attendance_bot.zip
          include-hidden-files: true
          if-no-files-found: error
