name: Build and Release Attendance Bot

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  MOD_NAME: attendance_bot
  PBO_NAME: attendance_bot

jobs:
  # ============================================================================
  # Linux 64-bit build
  # ============================================================================
  build-linux-64:
    name: Build Linux 64-bit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libcurl4-openssl-dev
          
    - name: Build extension
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ..
        cmake --build . --config ${{ env.BUILD_TYPE }} --target ${{ env.MOD_NAME }}
        cd ..
        
    - name: Rename output
      run: |
        mv build/${{ env.MOD_NAME }}.so build/${{ env.MOD_NAME }}_64.so
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: attendance-bot-linux-64
        path: build/${{ env.MOD_NAME }}_64.so
        retention-days: 7

  # ============================================================================
  # Linux 32-bit build
  # ============================================================================
  build-linux-32:
    name: Build Linux 32-bit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install 32-bit dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          gcc-multilib \
          g++-multilib \
          libcurl4-openssl-dev:i386
          
    - name: Build extension (32-bit)
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_FLAGS="-m32" \
          -DCMAKE_CXX_FLAGS="-m32" \
          ..
        cmake --build . --config ${{ env.BUILD_TYPE }} --target ${{ env.MOD_NAME }}
        cd ..
        
    - name: Rename output
      run: |
        mv build/${{ env.MOD_NAME }}.so build/${{ env.MOD_NAME }}_32.so
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: attendance-bot-linux-32
        path: build/${{ env.MOD_NAME }}_32.so
        retention-days: 7

  # ============================================================================
  # Windows build (optional - comment out if not needed)
  # ============================================================================
  # build-windows:
  #   name: Build Windows
  #   runs-on: windows-latest
  #   
  #   steps:
  #   - name: Checkout repository
  #     uses: actions/checkout@v4
  #     
  #   - name: Install dependencies
  #     run: |
  #       vcpkg install curl:x64-windows
  #       
  #   - name: Configure CMake
  #     run: |
  #       mkdir build
  #       cd build
  #       cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..
  #       
  #   - name: Build extension
  #     run: |
  #       cd build
  #       cmake --build . --config ${{ env.BUILD_TYPE }} --target ${{ env.MOD_NAME }}
  #       
  #   - name: Rename output
  #     run: |
  #       mv build/${{ env.BUILD_TYPE }}/${{ env.MOD_NAME }}.dll ${{ env.MOD_NAME }}.dll
  #       
  #   - name: Upload artifact
  #     uses: actions/upload-artifact@v4
  #     with:
  #       name: attendance-bot-windows
  #       path: ${{ env.MOD_NAME }}.dll
  #       retention-days: 7

  # ============================================================================
  # Release packaging
  # ============================================================================
  release:
    name: Package and Publish
    needs: [build-linux-64, build-linux-32]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Get version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Prepare mod structure
      run: |
        # Create mod directory
        mkdir -p ${{ env.MOD_NAME }}/addons
        
        # Copy 64-bit extension
        cp artifacts/attendance-bot-linux-64/${{ env.MOD_NAME }}_64.so ${{ env.MOD_NAME }}/attendance_bot_64.so
        
        # Copy 32-bit extension if available
        if [ -f "artifacts/attendance-bot-linux-32/${{ env.MOD_NAME }}_32.so" ]; then
          cp artifacts/attendance-bot-linux-32/${{ env.MOD_NAME }}_32.so ${{ env.MOD_NAME }}/attendance_bot_32.so
        else
          echo "32-bit extension not available"
        fi
        
        # Copy PBO source files
        mkdir -p ${{ env.MOD_NAME }}/addons/${{ env.PBO_NAME }}/scripts
        cp @attendance_bot/addons/attendance_bot/config.cpp ${{ env.MOD_NAME }}/addons/${{ env.PBO_NAME }}/
        cp @attendance_bot/addons/attendance_bot/scripts/init.sqf ${{ env.MOD_NAME }}/addons/${{ env.PBO_NAME }}/scripts/
        
        # Copy mod metadata
        cp @attendance_bot/mod.cpp ${{ env.MOD_NAME }}/mod.cpp
        cp @attendance_bot/logo.paa ${{ env.MOD_NAME }}/logo.paa
        
        # Copy config examples
        cp tools/config.hpp.example ${{ env.MOD_NAME }}/config.hpp.example
        cp tools/config.json.example ${{ env.MOD_NAME }}/config.json.example
        
        # Copy keys folder
        mkdir -p ${{ env.MOD_NAME }}/keys
        cp @attendance_bot/keys/readme.txt ${{ env.MOD_NAME }}/keys/
        
    - name: Install rapid-pbo for PBO packing
      run: |
        git clone https://github.com/ArmaLife/rapid-pbo.git /tmp/rapid-pbo
        cd /tmp/rapid-pbo
        make
        sudo make install
        cd $GITHUB_WORKSPACE
        
    - name: Pack PBO
      run: |
        cd ${{ env.MOD_NAME }}/addons
        rapid-pbo pack ${{ env.PBO_NAME }}.pbo ${{ env.PBO_NAME }}
        cd ../..
        
        # Clean up source folder
        if [ -f "${{ env.MOD_NAME }}/addons/${{ env.PBO_NAME }}.pbo" ]; then
          rm -rf "${{ env.MOD_NAME }}/addons/${{ env.PBO_NAME }}"
        fi
        
    - name: Create default symlink
      run: |
        ln -sf attendance_bot_64.so ${{ env.MOD_NAME }}/attendance_bot.so
        
    - name: Create release ZIP
      run: |
        mkdir -p release-package
        cp -r ${{ env.MOD_NAME }} release-package/
        cd release-package
        zip -r9 ../attendance_bot-v${{ steps.version.outputs.VERSION }}.zip .
        cd ..
        
    - name: Upload release ZIP
      uses: actions/upload-artifact@v4
      with:
        name: attendance-bot-release
        path: attendance_bot-v${{ steps.version.outputs.VERSION }}.zip
        retention-days: 30
        
    - name: Publish to GitHub Release (tagged)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        tag_name: ${{ github.ref }}
        name: Attendance Bot v${{ steps.version.outputs.VERSION }}
        body: |
          ## Attendance Bot v${{ steps.version.outputs.VERSION }}
          
          Server-side Arma 3 mod for tracking player join/leave events.
          
          **Includes:**
          - 64-bit Linux extension
          - 32-bit Linux extension
          - PBO with SQF scripts
          - Config examples
          
          **Install:**
          1. Extract ZIP
          2. Copy `@attendance_bot` to server
          3. Link extension: `ln -sf attendance_bot_64.so attendance_bot.so` (or _32.so)
          4. Create `config.hpp` with your API token
          5. Launch: `-mod=@attendance_bot`
          
          **Config example:**
          ```
          apiToken = your_bot_api_token_here
          endpoint = https://your-bot-api.com/api/bot/events
          ```
        files:
          attendance_bot-v${{ steps.version.outputs.VERSION }}.zip
        draft: false
        prerelease: false
        
    - name: Publish to Latest Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Attendance Bot - Latest
        body: |
          ## Latest Build
          
          Automated build from main branch.
          
          **Includes:** 64-bit & 32-bit Linux extensions + PBO
          
          **Install:**
          1. Download ZIP
          2. Copy `@attendance_bot` to server  
          3. Link: `ln -sf attendance_bot_64.so attendance_bot.so`
          4. Configure and launch with `-mod=@attendance_bot`
        files:
          attendance_bot-v${{ steps.version.outputs.VERSION }}.zip
        draft: false
        prerelease: true
        
    - name: Clean up
      if: always()
      run: |
        rm -rf release-package
        rm -f attendance_bot-v*.zip
        rm -rf artifacts
